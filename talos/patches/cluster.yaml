# Cluster-wide machine config patch — safe to commit (no secrets).
# Applied by talos/gen-config.sh on top of `talosctl gen config` output.
cluster:
  network:
    cni:
      name: none        # Cilium is installed by bootstrap.sh / Argo CD
  proxy:
    disabled: true      # kube-proxy replaced by Cilium eBPF
  allowSchedulingOnControlPlanes: true
machine:
  features:
    hostDNS:
      enabled: true
      # Must be false with Cilium bpf.masquerade — the host-forwarded
      # kube-dns path breaks under eBPF masquerading.
      forwardKubeDNSToHost: false
  # NOTE: systemDiskEncryption is emitted by gen-config.sh (TPM-sealed
  # keys when SECUREBOOT=1, nodeID keys otherwise). It must live in ONE
  # patch only — key lists merge by appending, and two keys claiming the
  # same LUKS slot fail validation.
