{{- if .Values.internalCA.enabled }}
# Bootstrap: a self-signed issuer whose only job is to sign the root CA.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
# The root CA certificate (lives as a Secret in cert-manager's namespace).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: internal-ca-root
  namespace: cert-manager
spec:
  isCA: true
  commonName: {{ .Values.internalCA.commonName }}
  duration: {{ .Values.internalCA.duration }}
  secretName: internal-ca-root
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
# The cluster's default issuer. To move to corporate PKI later, replace
# this `ca:` spec with a `venafi:` spec under the SAME name (see
# values.yaml) — nothing that references internal-ca has to change.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: internal-ca
spec:
  ca:
    secretName: internal-ca-root
{{- end }}
