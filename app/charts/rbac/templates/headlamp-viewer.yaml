{{- if .Values.viewer.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.viewer.name }}
  namespace: {{ .Values.viewer.namespace }}
---
# Namespaced read access via the built-in aggregated `view` ClusterRole
# (no Secrets, no writes).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.viewer.name }}-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: {{ .Values.viewer.name }}
  namespace: {{ .Values.viewer.namespace }}
---
# What `view` does not cover: cluster-scoped objects, the metrics API,
# and read-only access to operator CRs. Still zero write verbs and zero
# Secrets access.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.viewer.name }}-cluster-read
rules:
- apiGroups: [""]
  resources: [namespaces, nodes, persistentvolumes]
  verbs: [get, list, watch]
- apiGroups: [apiextensions.k8s.io]
  resources: [customresourcedefinitions]
  verbs: [get, list, watch]
- apiGroups: [storage.k8s.io]
  resources: [storageclasses, volumeattachments]
  verbs: [get, list, watch]
- apiGroups: [metrics.k8s.io]
  resources: [nodes, pods]
  verbs: [get, list]
- apiGroups: [rbac.authorization.k8s.io]
  resources: [clusterroles, clusterrolebindings, roles, rolebindings]
  verbs: [get, list, watch]
- apiGroups:
  {{- range .Values.viewer.crdGroups }}
  - {{ . }}
  {{- end }}
  resources: ["*"]
  verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.viewer.name }}-cluster-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.viewer.name }}-cluster-read
subjects:
- kind: ServiceAccount
  name: {{ .Values.viewer.name }}
  namespace: {{ .Values.viewer.namespace }}
{{- end }}
