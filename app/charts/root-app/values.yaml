# Modern-stack defaults (Cilium for everything). Per-cluster overlays can
# flip toggles/versions; selfValueFiles controls which values files the
# self-managing root-app Application passes to itself (empty -> this file).
selfValueFiles: []

apps:
  bitwarden: false        # re-enable once storage + SMTP are wired to the new cluster
  cdi: true              # disk import; pairs with kubevirt
  certManager: true
  cilium: true
  kubevirt: true
  externalSecrets: true
  gatewayApiCrds: true
  headlamp: true
  issuers: true
  keycloak: true
  kubePrometheusStack: true
  metricsServer: true
  rbac: true
  rookCeph: true
  rookCephCluster: true
  trivyOperator: true

# Headlamp UI plugins. Side-loaded by initContainer; see templates/headlamp.yaml.
headlampPlugins:
  kubevirt:
    enabled: true
    image: ghcr.io/naval-group/headlamp-kubevirt
    # Immutable digest of :latest as resolved 2026-07-23. Upstream publishes no
    # semver image tags, so there is nothing better to pin to.
    digest: sha256:7cdff58fdda4f3ad7b7a208b83744ec82648795056cf726f0ce5df2501ee3d14

versions:
  # KubeVirt/CDI manifests are vendored into their charts by
  # app/charts/vendor.sh, so these are documentation of the pinned release
  # rather than a chart reference. Keep them in step with what was vendored.
  kubevirt: v1.8.4
  cdi: v1.65.0
  certManager: v1.21.0
  externalSecrets: 2.8.0
  gatewayApi: v1.4.1
  headlamp: 0.43.0
  keycloakx: 7.2.2
  kubePrometheusStack: 87.17.0
  metricsServer: 3.13.1
  # Pinned to 1.19.x: 1.20's ceph-csi-operator won't create Driver CRs
  # (no RBD provisioner). 1.19 uses the proven in-operator legacy CSI.
  rookCeph: v1.19.7
  trivyOperator: 0.34.0
