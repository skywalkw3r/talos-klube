{{- if .Values.apps.gatewayApiCrds }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/kubernetes-sigs/gateway-api.git
    path: config/crd/standard
    targetRevision: {{ .Values.versions.gatewayApi }}
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false        # CRD deletion would cascade-delete Gateways/Routes
      selfHeal: true
    syncOptions:
    - ServerSideApply=true
{{- end }}
