{{- if .Values.apps.cdi }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cdi
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/skywalkw3r/talos-klube.git
    path: app/charts/cdi
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: cdi
  syncPolicy:
    automated:
      # As with kubevirt: pruning the CDI CR would pull the disk-import path
      # out from under any in-flight DataVolume.
      prune: false
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
{{- end }}
