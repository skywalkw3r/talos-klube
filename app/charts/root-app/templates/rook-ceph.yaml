{{- if .Values.apps.rookCeph }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook-ceph
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.rook.io/release
    chart: rook-ceph
    targetRevision: {{ .Values.versions.rookCeph }}
    helm:
      values: |
        # Rook 1.20's ceph-csi-operator controller-manager crashloops
        # (Driver/OperatorConfig cache sync timeout); use the proven
        # in-operator CSI provisioner instead.
        csi:
          disableCsiOperator: true
  destination:
    server: https://kubernetes.default.svc
    namespace: rook-ceph
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      prune: false
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
{{- end }}
