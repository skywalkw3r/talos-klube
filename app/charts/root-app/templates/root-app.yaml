apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/skywalkw3r/talos-klube.git
    path: app/charts/root-app
    targetRevision: main
    helm:
      valueFiles:
      {{- range (.Values.selfValueFiles | default (list "values.yaml")) }}
      - {{ . }}
      {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-cd
  syncPolicy:
    automated:
      selfHeal: true
