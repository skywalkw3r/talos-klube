{{- if .Values.apps.ingressNginx }}
# NOTE: ingress-nginx is retired upstream (no fixes after March 2026).
# 4.12.1 is the IngressNightmare (CVE-2025-1974) patch release; new
# clusters should use Cilium Gateway API instead (apps.cilium).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.12.1
    helm:
      values: |
        controller:
          admissionWebhooks:
            certManager:
              enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
{{- end }}
